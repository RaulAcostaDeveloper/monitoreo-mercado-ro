name: romarket-check

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  trigger-romarket:
    runs-on: ubuntu-latest

    steps:
      - name: Call protected Vercel endpoint
        run: |
          curl -X POST "${{ secrets.ROMARKET_ENDPOINT_URL }}" \
            -H "x-romarket-secret: ${{ secrets.ROMARKET_CRON_SECRET }}" \
            -H "content-type: application/json" \
            --fail-with-body
